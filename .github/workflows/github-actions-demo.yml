name: GitHub Actions Demo

on: 
  push:
    branches: main
    paths-ignore: [.github/**]
  pull_request:
    branches: main
  schedule: 
    - cron: "15 6 * * 0"
  workflow_dispatch:
    inputs:
      environment:
        type: environment
        required: true 

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Output event thet triggerd the workflow
        run: |
          echo "🎉 The job was triggered by event: ${{ github.event_name }}"
          echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ."
          
      - name: Checkout
        uses: actions/checkout@v4

      - name: List all files in repository
        run: |
            echo "The repository ${{ github.repository }} contains the following files:"
            tree
  Test:
    runs-on: ubuntu-latest
    needs: Build
    environment: Test
    if: github.event_name == 'workflow_dispatch'
    steps:
      - run: echo "🧪 Testing..."

  Load-Test:
    runs-on: ubuntu-latest
    needs: Build
    environment: Load-Test
    if: github.event_name == 'workflow_dispatch'
    steps:
       - run: |
          echo "🧪 Testing..."
          sleep 15

  Production: 
    runs-on: ubuntu-latest
    needs: [Load-Test, Test]
    environment: 
      name: Production
      url: https://writeabout.net
    if: github.event.inputs.environment == 'Production'
    steps:
      - run: |
          echo "🚀 Step 1..."
          sleep 10
      - run: |
          echo "🚀 Step 2..."
          sleep 10
      - run: |
          echo "🚀 Step 3..."
          sleep 10
      - run: |
          echo "🚀 Step 4..."
          sleep 10
      - run: |
          echo "🚀 Step 5..."
          sleep 10

    














    
    
