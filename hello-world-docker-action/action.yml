name: 'Hello world docker action'
description: 'Say hello to a user or the world'
inputs:
  who-to-greet:
    decription: 'Who to greet'
    required: true
    defualt: 'world'
outputs:
  time:
    description: 'The time we said hello'
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - {{ inputs.who-to-greet }}
    
